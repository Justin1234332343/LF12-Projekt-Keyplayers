<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seminar & Kursverwaltung</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo">SK</div>
      <div class="brand-text">
        <div class="title">Seminar & Kurs</div>
        <div class="subtitle">Verwaltungssystem</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard"      class="nav-item" data-view="dashboard">Dashboard</a>
      <a href="#kurse"          class="nav-item" data-view="kurse">Kurse</a>
      <a href="#firmen"         class="nav-item" data-view="firmen">Firmen</a>
      <a href="#teilnehmer"     class="nav-item" data-view="teilnehmer">Teilnehmer</a>
      <a href="#angebote"       class="nav-item" data-view="angebote">Angebote</a>
      <a href="#rechnungen"     class="nav-item" data-view="rechnungen">Rechnungen</a>
      <a href="#ki"             class="nav-item" data-view="ki">KI-Assistent</a>
    </nav>

    <div class="sidebar-footer">
      <span id="apiStatus" class="status-dot offline" title="API-Status"></span>
      <span id="apiStatusText">Verbinde…</span>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menü">☰</button>
      <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
    </header>

    <main class="content" id="content">
      <div class="loading">Lädt…</div>
    </main>
  </div>

</div>

<!-- Notification toast -->
<div id="toast" class="toast hidden"></div>

<!-- Modal -->
<dialog id="modal" class="modal">
  <div class="modal-card" id="modalCard"></div>
</dialog>

<script src="app.js"></script>
</body>
</html>
